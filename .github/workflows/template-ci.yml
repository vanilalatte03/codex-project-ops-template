name: Template CI

on:
  push:
  pull_request:

env:
  PYTHONUTF8: "1"

jobs:
  test:
    name: Python tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest scripts

      - name: Run template doctor
        run: python scripts/doctor.py --template

      - name: List configured checks
        run: python scripts/checks.py --list
